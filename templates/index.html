{% extends "base.html" %}
{% block title %}Fan Portal — StadiumPulse AI{% endblock %}
{% block content %}
<section class="hero">
<h1>Ask in any language.<br>Get there in four steps.</h1>
</section>
<section class="grid">
<div class="card">
<h2>AI Concierge</h2>
<div id="chatLog" class="chat-log" role="log" aria-live="polite" aria-relevant="additions">
<div class="msg msg--bot">Hi! Ask me about gates, seating, transport and accessibility.</div>
</div>
<form id="chatForm">
<input id="chatInput" type="text" aria-label="Ask the AI concierge" required>
<button type="submit">Send</button>
</form>
</div>

<div class="card">
<h2>Live Zone Status</h2>
<div id="zoneList" class="zone-list" aria-live="polite"></div>
</div>
</section>
{% endblock %}
