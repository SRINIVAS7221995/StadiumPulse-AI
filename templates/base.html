<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}StadiumPulse AI{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@700;800&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<header class="topbar" role="banner">
  <div class="topbar__brand">
    <span class="brand__mark">●</span>
    <span class="brand__name">StadiumPulse<span class="brand__ai">AI</span></span>
  </div>
  <nav class="topbar__nav" aria-label="Primary Navigation">
    <a href="{{ url_for('fan_portal') }}" class="{{ 'is-active' if request.path == '/' else '' }}">Fan Portal</a>
    <a href="{{ url_for('ops_dashboard') }}" class="{{ 'is-active' if request.path == '/ops' else '' }}">Command View</a>
  </nav>
  <div class="topbar__status">
    <span class="dot {{ 'dot--live' if ai_live else 'dot--offline' }}"></span>
    {{ 'GenAI live' if ai_live else 'Offline demo mode' }}
  </div>
</header>
<main id="main-content" tabindex="-1">
{% block content %}{% endblock %}
</main>
<footer class="footer" role="contentinfo">
Built for PromptWars · Challenge 4
</footer>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
