{% extends "base.html" %}
{% block title %}Command View — StadiumPulse AI{% endblock %}
{% block content %}
<section class="grid grid--ops">
<div class="card">
<h2>Zone Occupancy</h2>
<table class="zone-table">
<caption>Current Stadium Zone Occupancy</caption>
<thead><tr><th>Zone</th><th>Occupancy</th><th>Count</th><th>Wait</th><th>Status</th></tr></thead>
<tbody id="zoneTableBody"></tbody>
</table>
</div>

<div class="card">
<h2>Log Incident</h2>
<form id="incidentForm">
<label for="incZone">Incident Zone</label>
<select id="incZone" name="incZone" aria-required="true"></select>

<label for="incType">Incident Type</label>
<select id="incType">
<option>Overcrowding</option>
<option>Medical</option>
<option>Lost child</option>
<option>Security</option>
<option>Facility</option>
</select>

<label for="incNote">Incident Note</label>
<input id="incNote" type="text" placeholder="Short note (optional)">

<button type="submit">Log</button>
</form>

<ul id="incidentLog" class="incident-log" aria-live="polite"></ul>
</div>
</section>
{% endblock %}
